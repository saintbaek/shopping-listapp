<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f7fafc;
    }

    li + li {
      border-top: 1px solid #f0f4f8;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }

    .item-text.done {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 9px;
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #718096;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>
    <div class="empty" id="empty">아직 아이템이 없어요.</div>

    <button class="clear-btn" onclick="clearDone()">완료된 항목 삭제</button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');

    const input = document.getElementById('itemInput');
    const list  = document.getElementById('list');
    const empty = document.getElementById('empty');
    const stats = document.getElementById('stats');

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      list.innerHTML = '';
      items.forEach((item, i) => {
        const li = document.createElement('li');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.done;
        cb.onchange = () => { items[i].done = cb.checked; save(); render(); };

        const span = document.createElement('span');
        span.className = 'item-text' + (item.done ? ' done' : '');
        span.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => { items.splice(i, 1); save(); render(); };

        li.append(cb, span, del);
        list.appendChild(li);
      });

      empty.style.display = items.length === 0 ? 'block' : 'none';

      const done  = items.filter(it => it.done).length;
      const total = items.length;
      stats.textContent = total > 0 ? `${done} / ${total} 완료` : '';
    }

    function addItem() {
      const name = input.value.trim();
      if (!name) return;
      items.push({ name, done: false });
      input.value = '';
      save();
      render();
    }

    function clearDone() {
      items = items.filter(it => !it.done);
      save();
      render();
    }

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    render();
  </script>
</body>
</html>
